# =============================================================================
# AI Log Analyzer - Kubernetes Values
# =============================================================================
# Tento soubor je ŠABLONA. Pro každé prostředí existuje kopie v:
#   k8s-infra-apps-nprod/infra-apps/ai-log-analyzer/values.yaml
#   k8s-infra-apps-prod/infra-apps/ai-log-analyzer/values.yaml
#
# Docker image:
#   docker build -t dockerhub.kb.cz/<squad>/ai-log-analyzer:<tag> .
#   docker push dockerhub.kb.cz/<squad>/ai-log-analyzer:<tag>
# =============================================================================

# -----------------------------------------------------------------------------
# POVINNÉ — VYPLNIT PŘED DEPLOYEM
# -----------------------------------------------------------------------------
namespace: ai-log-analyzer            # K8s namespace pro deployment
environment: nprod                     # nprod | prod

# -----------------------------------------------------------------------------
# Application Image
# -----------------------------------------------------------------------------
app:
  name: log-analyzer
  image: dockerhub.kb.cz/<squad>/ai-log-analyzer:<tag>   # ← Doplnit squad a tag
  imagePullPolicy: IfNotPresent
  secretName: log-analyzer-secrets

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

# -----------------------------------------------------------------------------
# Persistent Storage
# -----------------------------------------------------------------------------
persistence:
  enabled: true
  claimName: log-analyzer-data
  mountPath: /data
  subPaths:
    registry: registry                # /data/registry - YAML fingerprinty
    exports: exports                  # /data/exports - JSON/MD/CSV reporty
    reports: reports                  # /data/reports - dočasné výstupy

# -----------------------------------------------------------------------------
# Conjur Configuration (CyberArk)
# -----------------------------------------------------------------------------
# Credentials jsou uloženy v CyberArk safe a injektovány přes Conjur.
# Registrace: PSIAM portál → Application Identity + Safe.
# Viz: docs/INSTALLATION.md#12-cyberark--conjur
# -----------------------------------------------------------------------------
conjur:
  image: dockerhub.kb.cz/ps-sq008-pub/cyberark/secrets-provider-for-k8s:1.7.3-kb.1
  imagePullPolicy: IfNotPresent
  containerName: conjur-secrets-provider

  applicationId: <PSIAM_APP_ID>          # ← Z PSIAM registrace
  componentId: restricted

  # EPV/CyberArk Safe
  lobUser: CAR_TA_LOBUser_<ENV>          # TEST pro nprod, PROD pro prod
  safeName: DAN_<SAFE_NAME>             # Název safe v CyberArk

  # Účty v safe
  accounts:
    confluence: <CONFLUENCE_USER>        # Confluence service account
    database: <DB_DML_USER>              # PostgreSQL DML user
    database_ddl: <DB_DDL_USER>          # PostgreSQL DDL user
    elastic: <ES_READ_USER>              # Elasticsearch read-only user

# -----------------------------------------------------------------------------
# Environment Variables
# -----------------------------------------------------------------------------
env:
  # === General ===
  ENVIRONMENT: nprod                     # nprod | prod
  LOG_LEVEL: INFO

  # === Directories (PVC mount) ===
  REGISTRY_DIR: /data/registry
  EXPORT_DIR: /data/exports

  # === PostgreSQL Database ===
  DB_HOST: <db_hostname>                 # nprod: P050TD01.DEV.KB.CZ | prod: <prod_host>
  DB_NAME: ailog_analyzer
  DB_PORT: "5432"

  # === Elasticsearch ===
  ES_HOST: <es_url>                      # nprod: https://elasticsearch-test.kb.cz:9500
  ES_INDEX: "cluster-app_<prefix>-*"   # Vzor pro vaše namespace

  # === Confluence ===
  CONFLUENCE_URL: "https://wiki.kb.cz"
  CONFLUENCE_PROXY: "http://cntlm.speed-default:3128"
  HTTP_PROXY: "http://cntlm.speed-default:3128"
  HTTPS_PROXY: "http://cntlm.speed-default:3128"
  CONFLUENCE_KNOWN_ERRORS_PAGE_ID: "<page_id>"
  CONFLUENCE_KNOWN_PEAKS_PAGE_ID: "<page_id>"

  # === Peak Detection ===
  SPIKE_THRESHOLD: "3.0"
  EWMA_ALPHA: "0.3"
  WINDOW_MINUTES: "15"
  PERCENTILE_LEVEL: "0.93"
  MIN_SAMPLES_FOR_THRESHOLD: "10"
  DEFAULT_THRESHOLD: "100"

  # === Alerting ===
  MAX_PEAK_ALERTS_PER_WINDOW: "3"
  ALERT_DIGEST_ENABLED: "true"
  ALERT_COOLDOWN_MIN: "45"
  ALERT_HEARTBEAT_MIN: "120"
  ALERT_MIN_DELTA_PCT: "30"
  ALERT_CONTINUATION_LOOKBACK_MIN: "60"

# -----------------------------------------------------------------------------
# Init Job (one-shot bootstrap)
# Spuštění: helm template k8s/ | kubectl apply -f - -l job-type=init
# -----------------------------------------------------------------------------
init:
  backfillDays: 21                       # Počet dní zpětně
  backfillWorkers: 4                     # Paralelní workery
  thresholdWeeks: 3                      # Týdnů pro výpočet P93/CAP
  activeDeadlineSeconds: 14400           # Max 4 hodiny

# -----------------------------------------------------------------------------
# Teams Webhook
# -----------------------------------------------------------------------------
teams:
  webhook_url: "<webhook_url>"
  email: "<teams_channel_email>"
